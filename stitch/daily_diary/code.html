<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daily Diary - Study App</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-dark {
            background: rgba(16, 22, 34, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Decorative Background Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px] -z-10"></div>
<!-- Header -->
<header class="sticky top-0 z-50 glass-dark px-4 py-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight">Daily Diary</h1>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined">calendar_today</span>
</button>
<button class="flex items-center justify-center size-10 rounded-full hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 px-4 py-6 space-y-8 max-w-2xl mx-auto w-full pb-32">
<!-- Date Header -->
<section>
<p class="text-primary font-semibold text-sm uppercase tracking-wider mb-1">Thursday, Oct 24</p>
<h2 class="text-3xl font-bold">Reflect on your growth</h2>
</section>
<!-- Daily Reflections Section -->
<section class="space-y-3">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">auto_awesome</span>
<h3 class="text-lg font-semibold">Daily Reflections</h3>
</div>
<div class="glass rounded-xl p-4">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-slate-100 placeholder:text-slate-500 min-h-[120px] resize-none p-0" placeholder="How was your day? Write your reflections here..."></textarea>
</div>
</section>
<!-- What I Studied Section -->
<section class="space-y-3">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">menu_book</span>
<h3 class="text-lg font-semibold">What I studied today</h3>
</div>
<div class="glass rounded-xl p-4">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-slate-100 placeholder:text-slate-500 min-h-[120px] resize-none p-0" placeholder="List the topics and concepts you covered..."></textarea>
</div>
</section>
<!-- Thoughts Section -->
<section class="space-y-3">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">lightbulb</span>
<h3 class="text-lg font-semibold">Thoughts</h3>
</div>
<div class="glass rounded-xl p-4">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-slate-100 placeholder:text-slate-500 min-h-[120px] resize-none p-0" placeholder="Any stray ideas or future goals?"></textarea>
</div>
</section>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Save Entry
            </button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 z-50 glass-dark border-t border-white/5 px-6 pb-8 pt-3">
<div class="max-w-md mx-auto flex justify-between items-center">
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="flex h-8 w-8 items-center justify-center text-slate-500 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">dashboard</span>
</div>
<p class="text-[10px] font-medium text-slate-500 group-hover:text-primary uppercase tracking-tighter">Dashboard</p>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="flex h-8 w-8 items-center justify-center text-slate-500 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">layers</span>
</div>
<p class="text-[10px] font-medium text-slate-500 group-hover:text-primary uppercase tracking-tighter">Stacks</p>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="flex h-8 w-8 items-center justify-center text-slate-500 group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">calendar_month</span>
</div>
<p class="text-[10px] font-medium text-slate-500 group-hover:text-primary uppercase tracking-tighter">Calendar</p>
</a>
<a class="flex flex-col items-center gap-1" href="#">
<div class="flex h-8 w-8 items-center justify-center text-primary bg-primary/10 rounded-full">
<span class="material-symbols-outlined fill-[1]">book</span>
</div>
<p class="text-[10px] font-bold text-primary uppercase tracking-tighter">Diary</p>
</a>
</div>
</nav>
</body></html>
